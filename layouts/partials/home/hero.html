<section class="hero-banner">

    {{ $video := "videos/hero.mp4" }}
    {{ $poster := "images/hero.png" }}

    {{ if $video }}

    {{ with resources.Get $poster }}
      {{ $posterOptimized := .Resize "1920x webp q75" }}
      <video autoplay muted loop playsinline class="video" poster="{{ $posterOptimized.RelPermalink }}">
    {{ else }}
      <video autoplay muted loop playsinline class="video" poster="{{ $poster }}">
    {{ end }}
        <source src="{{ $video }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    {{ else }}

    {{ with resources.Get $poster }}
      {{ $posterOptimized := .Resize "1920x webp q75" }}
      <img src="{{ $posterOptimized.RelPermalink }}" alt="hero image">
    {{ else }}
      <img src="{{ $poster }}" alt="hero image">
    {{ end }}
    {{ end }}
    <div class="background"></div>
    <div class="content">
        <h1 class="title" data-scenes='{{ site.Data.scene_headings.scenes | jsonify }}'>Ádám <span>Nagy</span></h1>
        <div class="roles">
            <p><code>00:00:00</code> Filmmaker</p>
            <p><code>00:00:01</code> Editor</p>
            <p><code>00:00:02</code> Musician</p>
            <p><code>00:00:03</code> Creative Technologist</p>
        </div>
    </div>
</section>
