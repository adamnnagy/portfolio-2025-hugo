{{ define "main" }}
<section class="container fade-in-page">
    <h1>{{ .Title }}</h1>


    <ul class="project-list">
        {{ range sort .Pages "Date" "desc" }}

        <li class="project-card">
        <article class="scroll-fade-in">
            <a href="{{ .RelPermalink }}">
                    <div>
                        <h2 class="project-title">
                            {{ .Title }} | {{ .Params.role }}
                        </h2>
                        <p class="description">{{.Params.description}}</p>
                        <p class="city">{{.Params.city}}</p>
                    </div>
                    {{ with .Resources.GetMatch "cover.*" }}
                    <img src="{{ .RelPermalink }}" alt="{{ $.Title }}" class="thumbnail" />
                    {{ end }}
                </a>
            </article>
        </li>

        {{ end }}
    </ul>
</section>
{{ end }}
