<section class="hero-banner fade-in-page">
    
    <video autoplay muted loop playsinline class="video">
        <source src="{{ path.Join .projectDir .hero | relURL }}" type="video/mp4">
        
        Your browser does not support the video tag.
    </video>
    <div class="background"></div>
    <div class="content">
        <h1 class="title">{{.title}}</span></h1>
        <div class="roles">
            <h2>{{ .role }}</h2>
        </div>
    </div>
</section>
