{{ define "main" }}

<div class="about">

    <section class="hero-banner fade-in-page">
        <video autoplay muted loop playsinline class="video">
            <source src="{{ "projects/music-making/hero.mp4" | relURL }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="background"></div>
        <div class="content">
            <h1 class="title" data-scenes='{{ site.Data.scene_headings.scenes | jsonify }}'><span>{{ .Params.title }}</span></h1>
        </div>
    </section>

    <section class="container">
        {{ partial "artisjus/welcome.html" . }}
    </section>

    <section class="container">
        {{ partial "about/stats-hu.html" . }}
    </section>

    <section class="content-page container">
        {{ .Content }}
    </section>

</div>
{{ end }}
