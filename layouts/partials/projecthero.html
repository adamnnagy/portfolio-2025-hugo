<section class="hero-banner fade-in-page">

    {{ $src := path.Join .projectDir .hero }}

    {{/*  {{ if strings.HasSuffix $src ".mp4" }}  */}}

    {{/* check if src is video or image */}}
    <video autoplay muted loop playsinline class="video"
        poster="{{ .Site.BaseURL | absLangURL }}{{ path.Join .projectDir }}/cover.jpg"
        data-debug="DEBUG: {{ .Site.BaseURL | absLangURL }}{{ path.Join .projectDir }}.jpg">
        {{/* construct path manually to avoid inconsistent behavior with relURL/absURL when relativeURLs is true */}}


        <source src="{{ .Site.BaseURL | absLangURL }}{{ $src }}" type="video/mp4">

        Your browser does not support the video tag.
    </video>

    {{/*  {{ end }}  */}}
    <div class="background"></div>
    <div class="content">
        <h1 class="title">{{.title}}</span></h1>
        <div class="roles">
            <h2>{{ .role }}</h2>
        </div>
    </div>
</section>
