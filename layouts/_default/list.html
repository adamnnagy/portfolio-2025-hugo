{{ define "main" }}
  <section>
      <h1>Projects</h1>
      <ul>
      {{ range .Pages }}
        <article class="scroll-fade-in">
            <li>
              <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
              <p>{{ .Params.description }}</p>
              {{ with .Params.image }}
                <img src="{{ . }}" alt="{{ $.Title }}" />
              {{ end }}
            </li>
        </article>
      {{ end }}
      </ul>
  </section>
{{ end }}
